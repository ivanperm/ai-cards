      transform: translateY(1px);

      margin-top: 8px;

    }

<body>
  <div class="card">
    <h1>Решение проблемы</h1>

    <div id="prompt" class="prompt-box"></div>

    <div class="button-row">
    <button type="button" onclick="copyPrompt()">РЎРєРѕРїРёСЂРѕРІР°С‚СЊ РїСЂРѕРјРїС‚</button>
    <button type="button" onclick="goBack()">Назад</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <script>
    // рџ‘‰ Р—РґРµСЃСЊ РјРµРЅСЏРµС€СЊ С‚РµРєСЃС‚ РїСЂРѕРјРїС‚Р° РґР»СЏ РЅСѓР¶РЅРѕР№ РєР°СЂС‚РѕС‡РєРё
    const promptText = 'РўС‹ РѕРїС‹С‚РЅС‹Р№ РјРµРґРёР°С‚РѕСЂ. РЎС„РѕСЂРјСѓР»РёСЂСѓР№ СЂРµС€РµРЅРёРµ РїСЂРѕР±Р»РµРјС‹, СѓС‡РёС‚С‹РІР°Р№ РІСЃРµ СЃС‚РѕСЂРѕРЅС‹ РІРѕРїСЂРѕСЃР°. Р’РѕС‚ РїСЂРѕР±Р»РµРјР°: ***';

    // Р’С‹РІРѕРґРёРј С‚РµРєСЃС‚ РїСЂРѕРјРїС‚Р° РІ Р±Р»РѕРє
    document.getElementById('prompt').textContent = promptText;

    function copyPrompt() {
      const statusEl = document.getElementById('status');

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(promptText)
          .then(() => {
            statusEl.textContent = 'РџСЂРѕРјРїС‚ СЃРєРѕРїРёСЂРѕРІР°РЅ.';
          })
          .catch(() => {
            fallbackCopy();
          });
      } else {
        fallbackCopy();
      }
    }

    function goBack() {
      window.location.href = 'index.html';
    }

    function fallbackCopy() {
      const statusEl = document.getElementById('status');
      const temp = document.createElement('textarea');
      temp.value = promptText;
      temp.style.position = 'fixed';
      temp.style.opacity = '0';
      document.body.appendChild(temp);
      temp.select();
      try {
        document.execCommand('copy');
        statusEl.textContent = 'РџСЂРѕРјРїС‚ СЃРєРѕРїРёСЂРѕРІР°РЅ.';
      } catch (e) {
        statusEl.textContent = 'РќРµ СѓРґР°Р»РѕСЃСЊ СЃРєРѕРїРёСЂРѕРІР°С‚СЊ РїСЂРѕРјРїС‚.';
      }
      document.body.removeChild(temp);
    }
  </script>
</body>
